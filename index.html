<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Garden Side</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B5D47">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Garden Side">
<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<style>
/* ===== Garden page scoped styles ===== */

/* Annule les animations .fade-in sur les enfants directs :
   leur fill-mode "both" écrase les transforms CSS (ex. translateX(-50%)
   de la toolbar mobile), les rendant inutilisables. */
#pageGarden > * { animation: none; }

#pageGarden {
  display: none;
  flex-direction: column;
  height: 100%;
  padding: 0;
  overflow: hidden;
}
#pageGarden.active {
  display: flex;
  /* Pas de transform ici : évite le stacking context qui casse position:fixed (FAB, toolbar) */
  animation: gardenEnter 0.36s var(--ease-out) both;
}
@keyframes gardenEnter {
  from { opacity: 0; }
  to   { opacity: 1; }
}
#garden-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: 100%;
}
#garden-sidebar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 4px;
  background: #1a2e1a;
  width: 48px;
  flex-shrink: 0;
  overflow-y: auto;
}
.gd-tool-btn {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  color: #d4e8c2;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.gd-tool-btn:hover, .gd-tool-btn.active {
  background: #2d7a3a;
  color: #fff;
}
.gd-sep {
  width: 28px;
  border: none;
  border-top: 1px solid rgba(255,255,255,0.15);
  margin: 2px 0;
}
#garden-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
#mode-indicator {
  position: absolute;
  top: 6px;
  left: 8px;
  background: rgba(0,0,0,0.55);
  color: #d4e8c2;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  pointer-events: none;
  z-index: 5;
}
#garden-canvas-wrap {
  flex: 1;
  overflow: hidden;
  background: #2a4a2a;
}
#garden-canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#fence-panel {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 6px 12px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  z-index: 10;
}
#fence-panel button {
  border: none;
  border-radius: 12px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
}
#btn-fence-done  { background: #2d7a3a; color: #fff; }
#btn-fence-cancel{ background: #8b2020; color: #fff; }
.prop-panel {
  width: 200px;
  flex-shrink: 0;
  background: #f5f7f2;
  border-left: 1px solid #cdd9c5;
  overflow-y: auto;
  padding: 10px 8px;
  font-size: 13px;
}
.garden-toast {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 6px 16px;
  border-radius: 16px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
.garden-toast.show { opacity: 1; }

/* ── Mode vue (lecture seule) ── */
#pageGarden.gd-viewmode [data-tool],
#pageGarden.gd-viewmode #btn-undo,
#pageGarden.gd-viewmode #btn-delete,
#pageGarden.gd-viewmode #btn-snap,
#pageGarden.gd-viewmode #btn-save,
#pageGarden.gd-viewmode #btn-reset {
  opacity: 0.25;
  pointer-events: none;
}
#pageGarden.gd-viewmode #btn-view-toggle {
  opacity: 1;
  pointer-events: auto;
  background: #2d7a3a;
  color: #fff;
}
#pageGarden.gd-viewmode #garden-canvas { cursor: grab; }
.mode-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(0,0,0,0.55);
  color: #d4e8c2;
}
.mode-badge.mode-view {
  background: rgba(45,122,58,0.85);
  color: #fff;
}

/* ── Panneau climatique dans les propriétés jardin ── */
.gd-climate-block {
  margin-top: 12px;
  border-top: 1px solid #cdd9c5;
  padding-top: 10px;
}
.gd-climate-title {
  font-size: 11px;
  font-weight: 700;
  color: #2e6e50;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.gd-climate-row {
  font-size: 12px;
  color: #3a4a35;
  padding: 2px 0;
  line-height: 1.5;
}
.gd-climate-row strong { color: #1a3020; }
.gd-climate-warn { color: #c07000; font-size: 11px; }
.gd-climate-ok   { color: #2e6e50; font-size: 11px; font-weight: 600; }
.gd-climate-none { color: #888; font-style: italic; }
.gd-climate-btn {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 10px 14px;
  border: none;
  border-radius: 22px;
  background: var(--primary, #0B5D47);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 3px 10px rgba(11,93,71,0.26);
  transition: all 0.15s;
  letter-spacing: 0.2px;
}
.gd-climate-btn:hover {
  background: #0d7055;
  transform: translateY(-1px);
  box-shadow: 0 5px 14px rgba(11,93,71,0.34);
}
.gd-link-btn { margin-top: 8px; background: rgba(46,110,80,0.88); color: #fff; }
.gd-link-btn:hover { background: #1a4a30; transform: translateY(-1px); }

/* ── Éléments mobiles : cachés par défaut sur desktop ── */
#gd-mobile-toolbar,
#gd-fab,
#gd-add-menu,
#gd-sheet-overlay,
#gd-bottom-sheet { display: none; }

/* ── Vue jardin mobile ── */
@media (max-width: 768px) {
  /* Cache les éléments desktop */
  #garden-sidebar { display: none !important; }
  #prop-panel     { display: none !important; }

  /* Toolbar flottante — bas centre */
  #gd-mobile-toolbar {
    display: flex;
    position: fixed;
    bottom: 74px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(18, 38, 18, 0.90);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 14px;
    gap: 6px;
    z-index: 120;
    box-shadow: 0 4px 24px rgba(0,0,0,0.40);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .gd-m-tool {
    width: 46px;
    height: 46px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: #d4e8c2;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .gd-m-tool:active,
  .gd-m-tool.active { background: #2d7a3a; color: #fff; }
  .gd-m-sep {
    width: 1px;
    height: 26px;
    background: rgba(255,255,255,0.15);
    align-self: center;
    margin: 0 2px;
    flex-shrink: 0;
  }

  /* FAB — bas droite */
  #gd-fab {
    display: flex;
    position: fixed;
    bottom: 74px;
    right: 16px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: linear-gradient(140deg, #3a9a4a 0%, #1a5228 100%);
    color: #fff;
    border: none;
    font-size: 32px;
    line-height: 1;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 22px rgba(0,0,0,0.42);
    z-index: 121;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #gd-fab.open {
    transform: rotate(45deg);
    background: linear-gradient(140deg, #c03030 0%, #5a1010 100%);
  }

  /* Menu ajout — au-dessus du FAB */
  #gd-add-menu {
    display: flex;
    position: fixed;
    bottom: 144px;
    right: 16px;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    z-index: 122;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateY(14px) scale(0.97);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s 0.18s;
  }
  #gd-add-menu.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(0) scale(1);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s;
  }
  .gd-add-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(18,38,18,0.93);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #d4e8c2;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 28px;
    padding: 11px 18px;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 2px 16px rgba(0,0,0,0.30);
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    font-family: inherit;
  }
  .gd-add-item:active { background: rgba(45,122,58,0.85); }

  /* Overlay demi-transparent */
  #gd-sheet-overlay {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.40);
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    /* backdrop-filter retiré ici — il bloque les clics sur iOS (bug pointer-events+backdrop-filter) */
    transition: opacity 0.25s, visibility 0s 0.25s;
  }
  #gd-sheet-overlay.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition: opacity 0.25s, visibility 0s;
  }

  /* Bottom sheet — 3 états : compact / expanded / fermé */
  #gd-bottom-sheet {
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 50%;
    bottom: 0;
    width: calc(100% - 24px);
    max-width: 430px;
    height: 80vh;
    background: #fafaf8;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.18), 0 -1px 0 rgba(0,0,0,0.04);
    z-index: 201;
    transform: translateX(-50%) translateY(100%);
    transition: transform 0.34s cubic-bezier(0.32, 0.72, 0, 1);
    overflow: hidden;
    box-sizing: border-box;
  }
  #gd-bottom-sheet.compact  { transform: translateX(-50%) translateY(42vh); }
  #gd-bottom-sheet.expanded { transform: translateX(-50%) translateY(0); }

  /* Handle — zone de touché pleine largeur avec pill visuelle */
  #gd-sheet-handle {
    flex-shrink: 0;
    width: 100%;
    min-height: 28px;
    padding: 10px 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  #gd-sheet-handle::before {
    content: '';
    display: block;
    width: 44px;
    height: 5px;
    background: #d8d8d8;
    border-radius: 3px;
  }

  #gd-sheet-content {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 4px 18px 8px;
    box-sizing: border-box;
  }

  /* Footer actions — visible en bas du sheet (expanded) */
  #gd-sheet-footer {
    flex-shrink: 0;
    padding: 6px 18px calc(6px + env(safe-area-inset-bottom, 0px));
    background: #fafaf8;
    border-top: 1px solid #f0ede8;
  }

  /* Badge de mode — descendu sur mobile pour ne pas coller au header */
  #mode-indicator {
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(10,30,10,0.60);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    white-space: nowrap;
  }

  /* Contenu du sheet */
  .gd-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0 8px;
    gap: 8px;
  }
  .gd-sheet-head-info { flex: 1; min-width: 0; }
  .gd-sheet-head-btns {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    align-items: center;
  }
  /* Boutons icônes dans le header — toujours visibles en compact */
  .gd-sh-icon-btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: #ededea;
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .gd-sh-icon-btn:active { opacity: 0.65; }
  .gd-sh-icon-del { background: #fdeaea; }
  .gd-sheet-type {
    font-size: 16px;
    font-weight: 700;
    color: #1a3020;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gd-sheet-surface {
    font-size: 12px;
    color: #2e6e50;
    font-weight: 600;
    background: #e8f5e2;
    padding: 2px 10px;
    border-radius: 14px;
    display: inline-block;
    margin-top: 2px;
  }
  .gd-sheet-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid #f2f2f2;
  }
  .gd-sheet-label {
    font-size: 13px;
    color: #777;
    flex-shrink: 0;
  }
  .gd-sheet-input {
    flex: 1;
    text-align: right;
    border: none;
    background: transparent;
    font-size: 15px;
    color: #1a3020;
    font-weight: 500;
    padding: 0;
    outline: none;
    min-width: 0;
    font-family: inherit;
  }
  select.gd-sheet-input { cursor: pointer; }
  /* Masque les spinners natifs des inputs numériques pour aligner la valeur à droite */
  .gd-sh-num::-webkit-outer-spin-button,
  .gd-sh-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .gd-sh-num { -moz-appearance: textfield; }
  .gd-sh-checkbox {
    flex: 0 0 auto;
    width: 22px;
    height: 22px;
    accent-color: #2d7a3a;
    cursor: pointer;
  }
  .gd-sheet-row2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 8px;
  }
  .gd-sheet-row2col .gd-sheet-row { font-size: 13px; }
  /* Bouton accordéon */
  .gd-sh-more-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0 7px;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    color: #2e6e50;
    cursor: pointer;
    border-top: 1px solid #efefef;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .gd-sh-more-arrow {
    font-size: 12px;
    transition: transform 0.22s ease;
    display: inline-block;
  }
  .gd-sh-more-btn.open .gd-sh-more-arrow { transform: rotate(180deg); }

  /* Section secondaire collapsible */
  .gd-sh-secondary {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.28s ease;
  }
  .gd-sh-secondary.open { max-height: 600px; }

  .gd-sheet-actions {
    display: flex;
    gap: 10px;
  }
  .gd-sheet-btn {
    flex: 1;
    padding: 15px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .gd-sheet-btn:active { opacity: 0.75; }
  .gd-sheet-btn-save { background: #2d7a3a; color: #fff; }
  .gd-sheet-btn-del  { background: #f5f0f0; color: #8b2020; }

  /* ── Mode plein écran jardin ────────────────────────────── */
  /* Masque header + bottom-nav uniquement sur mobile en page jardin */
  body.gd-garden-active .app-header { display: none !important; }
  body.gd-garden-active .bottom-nav { display: none !important; }

  /* style.css met un padding-top sur body égal à --header-height → barre blanche */
  body.gd-garden-active {
    padding-top: 0 !important;
    padding-bottom: 0 !important;
  }

  /* appMain sans padding header/nav en mode jardin */
  body.gd-garden-active #appMain {
    padding-top: 0 !important;
    padding-bottom: 0 !important;
  }

  /* Supprime le padding interne de .page et le min-height calculé avec header+nav */
  body.gd-garden-active #pageGarden {
    padding: 0 !important;
    min-height: 0 !important;
    height: 100vh;      /* fallback */
    height: 100dvh;     /* dynamic viewport height (iOS Safari address bar) */
    overflow: hidden;
  }

  /* Toolbar : descend au ras du bas (safe-area pour iPhone) */
  body.gd-garden-active #gd-mobile-toolbar {
    bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  }

  /* FAB et menu : recalés par rapport à la nouvelle position toolbar */
  body.gd-garden-active #gd-fab {
    bottom: calc(76px + env(safe-area-inset-bottom, 0px));
  }
  body.gd-garden-active #gd-add-menu {
    bottom: calc(146px + env(safe-area-inset-bottom, 0px));
  }

  /* Bottom sheet : footer prend en compte la safe-area (pas de nav à compenser) */
  body.gd-garden-active #gd-sheet-footer {
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  }
}
</style>
</head>
<body>
<!-- ========== SPLASH SCREEN ========== -->
<div id="splashScreen" class="splash-screen">
  <div class="splash-inner">
    <img src="icon-192.png" alt="" class="splash-logo-img">
    <h1 class="splash-title">My Garden Side</h1>
    <p class="splash-sub">Votre jardin intelligent</p>
    <div class="splash-dots">
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
    </div>
  </div>
</div>
<!-- ========== HEADER ========== -->
<header class="app-header">
  <button class="header-back" id="headerBack" onclick="goBack()">&#8249;</button>
  <button class="header-hamburger" id="headerHamburger" onclick="togglePlusMenu()" aria-label="Menu">
    <span class="hbg-line"></span>
    <span class="hbg-line"></span>
    <span class="hbg-line"></span>
  </button>
  <div class="header-logo-wrap" id="headerLogoWrap">
    <div class="header-brand-icon" aria-hidden="true">
      <img src="icon-192.png" alt="" class="header-brand-img">
    </div>
    <h1 id="headerTitle" class="header-title-text">My Garden Side</h1>
  </div>
<span class="header-season" id="headerSeason"></span>
</header>
<!-- ========== PAGES ========== -->
<main id="appMain">
  <div class="page" id="pageDashboard"></div>
  <div class="page" id="pageBeds"></div>
  <div class="page" id="pageCrops"></div>
  <div class="page" id="pageToday"></div>
  <div class="page" id="pageCalendar"></div>
  <div class="page" id="pagePlanning"></div>
  <div class="page" id="pageAnalysis"></div>
  <div class="page" id="pageSettings"></div>
  <div class="page" id="pageNotifications"></div>
  <div class="page" id="pageAi"></div>
  <div class="page" id="pageVeggieref"></div>
  <!-- ========== PAGE JARDIN ========== -->
  <div class="page" id="pageGarden">
    <div id="garden-layout">
      <div id="garden-sidebar">
        <button class="gd-tool-btn" data-tool="select"  data-i18n-title="select_tool"  title="Sélectionner">&#9654;</button>
        <button class="gd-tool-btn" data-tool="bed"     data-i18n-title="fab_bed"      title="Espace de culture">&#9632;</button>
        <button class="gd-tool-btn" data-tool="serre"   data-i18n-title="fab_serre"    title="Serre">&#9651;</button>
        <button class="gd-tool-btn" data-tool="house"   data-i18n-title="fab_house"    title="Maison">&#8962;</button>
        <button class="gd-tool-btn" data-tool="tree"    data-i18n-title="fab_tree"     title="Arbre">&#9924;</button>
        <button class="gd-tool-btn" data-tool="path"    data-i18n-title="fab_path"     title="Chemin">&#126;</button>
        <button class="gd-tool-btn" data-tool="fence"   data-i18n-title="fab_fence"    title="Clôture">&#9135;</button>
        <hr class="gd-sep">
        <button class="gd-tool-btn" id="btn-undo"   title="Annuler">&#8630;</button>
        <button class="gd-tool-btn" id="btn-delete" title="Supprimer">&#128465;</button>
        <hr class="gd-sep">
        <button class="gd-tool-btn" id="btn-snap"        title="Snap grille">&#9707;</button>
        <button class="gd-tool-btn" id="btn-save"        title="Sauvegarder">&#128190;</button>
